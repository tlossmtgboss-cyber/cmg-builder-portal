<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<script>(function(){var p=location.pathname;var b=document.createElement('base');if(p.indexOf('/builder-application')===0)b.href='/builder-application/';else if(p.indexOf('/cmg-builder-portal/')===0)b.href=p.substring(0,p.indexOf('/cmg-builder-portal/')+20);else b.href=p.substring(0,p.lastIndexOf('/')+1);document.head.appendChild(b);})()</script>
<title>CMG Builder Portal — Schedule Consultation</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg-page: #FAF7F1;
    --bg-surface: #FFFFFF;
    --bg-soft: #FBF8F2;
    --border: #ECE6D8;
    --border-strong: #D8D0BD;
    --brand: #1F3D2E;
    --brand-light: #2A4F3D;
    --brand-tint: #EFF3EE;
    --brand-soft: #E5EDE6;
    --gold: #B8924A;
    --gold-deep: #6B4F1A;
    --text-primary: #1A1F1B;
    --text-secondary: #4F554E;
    --text-muted: #8B8A7E;
    --text-faint: #B5B2A4;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Geist', system-ui, sans-serif;
    background: var(--bg-page);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .card {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    box-shadow: 0 4px 24px rgba(0,0,0,.06);
    width: 100%;
    max-width: 480px;
    overflow: hidden;
  }

  .card-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .card-header .back-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 32px;
    height: 32px;
    border-radius: 8px;
    border: 1px solid var(--border);
    color: var(--text-secondary);
    text-decoration: none;
    font-size: 16px;
    transition: all 150ms ease;
    background: var(--bg-surface);
    flex-shrink: 0;
  }
  .card-header .back-btn:hover { border-color: var(--brand); color: var(--brand); }
  .card-header-text { font-family: 'Geist Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-muted); }

  .card-body { padding: 24px; }

  /* Section titles */
  .section-title {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 4px;
  }
  .section-sub {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 16px;
  }

  /* Day picker */
  .day-picker {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 28px;
  }
  .day-nav {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--bg-surface);
    color: var(--text-secondary);
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 150ms ease;
    flex-shrink: 0;
  }
  .day-nav:hover { border-color: var(--brand); color: var(--brand); }
  .day-nav:disabled { opacity: .3; cursor: default; }
  .day-nav:disabled:hover { border-color: var(--border); color: var(--text-secondary); }

  .day-scroll {
    display: flex;
    gap: 6px;
    flex: 1;
    overflow: hidden;
  }

  .day-cell {
    flex: 1;
    min-width: 0;
    padding: 10px 4px;
    border-radius: 10px;
    border: 1px solid var(--border);
    text-align: center;
    cursor: pointer;
    transition: all 200ms ease;
    background: var(--bg-surface);
  }
  .day-cell:hover { border-color: var(--brand); background: var(--brand-tint); }
  .day-cell.selected {
    background: var(--brand);
    border-color: var(--brand);
    transform: scale(1.04);
    box-shadow: 0 4px 12px rgba(31,61,46,.25);
  }
  .day-cell.selected .day-name,
  .day-cell.selected .day-num,
  .day-cell.selected .day-month { color: #fff; }

  .day-name {
    font-family: 'Geist Mono', monospace;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    margin-bottom: 2px;
  }
  .day-num {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--text-primary);
    line-height: 1.2;
  }
  .day-month {
    font-family: 'Geist Mono', monospace;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin-top: 1px;
  }

  /* Time picker */
  .time-section { margin-bottom: 24px; }
  .time-label {
    font-family: 'Geist Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-muted);
    margin-bottom: 8px;
  }
  .time-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
  }
  .time-slot {
    padding: 10px 6px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg-surface);
    font-family: 'Geist', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
    text-align: center;
    cursor: pointer;
    transition: all 150ms ease;
  }
  .time-slot:hover { border-color: var(--brand); background: var(--brand-tint); }
  .time-slot.selected {
    background: var(--brand);
    border-color: var(--brand);
    color: #fff;
  }

  /* Divider */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 24px 0;
  }

  /* User info */
  .user-info {
    background: var(--bg-soft);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 20px;
  }
  .user-info-row {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.8;
  }
  .user-info-label {
    font-weight: 600;
    color: var(--text-primary);
  }

  /* Submit */
  .submit-btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    background: var(--brand);
    color: #fff;
    font-family: 'Geist', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 200ms ease;
  }
  .submit-btn:hover { background: var(--brand-light); box-shadow: 0 4px 16px rgba(31,61,46,.2); }
  .submit-btn:disabled { opacity: .4; cursor: default; }
  .submit-btn:disabled:hover { background: var(--brand); box-shadow: none; }

  /* Success state */
  .success-state { display: none; text-align: center; padding: 40px 24px; }
  .success-state.visible { display: block; }
  .success-check {
    width: 64px; height: 64px; border-radius: 50%;
    background: var(--brand-tint); color: var(--brand);
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 28px; margin-bottom: 16px;
    animation: pop-in 400ms ease;
  }
  @keyframes pop-in {
    0% { transform: scale(0); opacity: 0; }
    60% { transform: scale(1.15); }
    100% { transform: scale(1); opacity: 1; }
  }
  .success-title {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 22px; font-weight: 600;
    margin-bottom: 8px;
  }
  .success-detail {
    font-size: 14px; color: var(--text-secondary);
    margin-bottom: 6px;
  }
  .success-summary {
    background: var(--bg-soft);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    margin: 20px 0;
    text-align: left;
  }
  .success-summary-row {
    display: flex; justify-content: space-between;
    font-size: 13px; color: var(--text-secondary); line-height: 2;
  }
  .success-summary-val { font-weight: 600; color: var(--text-primary); }
  .portal-btn {
    display: inline-block;
    padding: 12px 32px;
    border-radius: 10px;
    background: var(--brand);
    color: #fff;
    text-decoration: none;
    font-weight: 600;
    font-size: 14px;
    transition: all 150ms ease;
    margin-top: 8px;
  }
  .portal-btn:hover { background: var(--brand-light); }

  /* Booking form hidden by default */
  .booking-form { display: block; }
  .booking-form.hidden { display: none; }

  /* No times placeholder */
  .no-times {
    text-align: center;
    padding: 20px;
    color: var(--text-muted);
    font-size: 13px;
    font-style: italic;
  }

  @media (max-width: 520px) {
    body { padding: 12px; }
    .card { border-radius: 12px; }
    .day-cell { padding: 8px 2px; }
    .day-num { font-size: 18px; }
    .time-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <a href="portal.html" class="back-btn" title="Back to Portal">&larr;</a>
    <span class="card-header-text">Schedule Consultation</span>
  </div>

  <!-- Booking Form -->
  <div class="card-body booking-form" id="bookingForm">
    <div class="section-title">Pick a date</div>
    <div class="section-sub"></div>

    <div class="day-picker">
      <button class="day-nav" id="prevWeek" onclick="shiftDays(-5)">&lsaquo;</button>
      <div class="day-scroll" id="dayScroll"></div>
      <button class="day-nav" id="nextWeek" onclick="shiftDays(5)">&rsaquo;</button>
    </div>

    <div class="section-title">Pick a time</div>
    <div class="section-sub">Choose your preferred time. Reschedule anytime.</div>

    <div class="time-section" id="timeSection">
      <div class="time-label">Morning</div>
      <div class="time-grid" id="morningSlots"></div>
      <div style="height:12px;"></div>
      <div class="time-label">Afternoon</div>
      <div class="time-grid" id="afternoonSlots"></div>
    </div>

    <div class="divider"></div>

    <div class="user-info" id="userInfo">
      <div class="user-info-row"><span class="user-info-label">Scheduling for:</span> <span id="infoName">—</span></div>
      <div class="user-info-row"><span class="user-info-label">Email:</span> <span id="infoEmail">—</span></div>
    </div>

    <button class="submit-btn" id="submitBtn" disabled onclick="submitBooking()">Submit</button>
  </div>

  <!-- Success State -->
  <div class="success-state" id="successState">
    <div class="success-check">&#10003;</div>
    <div class="success-title">You're all set!</div>
    <div class="success-detail">Your consultation has been scheduled.</div>
    <div class="success-summary">
      <div class="success-summary-row"><span>Date</span><span class="success-summary-val" id="successDate"></span></div>
      <div class="success-summary-row"><span>Time</span><span class="success-summary-val" id="successTime"></span></div>
      <div class="success-summary-row"><span>Duration</span><span class="success-summary-val">30 minutes</span></div>
      <div class="success-summary-row"><span>With</span><span class="success-summary-val">Tim Loss</span></div>
    </div>
    <a href="portal.html" class="portal-btn">Back to Portal</a>
  </div>
</div>

<div style="text-align:center; margin-top:16px;">
  <span style="font-family:'Geist Mono',monospace; font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-faint);">CMG Home Loans &middot; Builder Portal</span>
</div>

<script>
(function() {
  const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const DAYS_SHORT = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const MONTHS_FULL = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  const MORNING = ['9:00 AM','9:30 AM','10:00 AM','10:30 AM','11:00 AM','11:30 AM'];
  const AFTERNOON = ['1:00 PM','1:30 PM','2:00 PM','2:30 PM','3:00 PM','3:30 PM'];

  let selectedDate = null;
  let selectedTime = null;
  let startOffset = 0;

  // Load user info from localStorage
  let userName = '—';
  let userEmail = '—';
  try {
    const acct = JSON.parse(localStorage.getItem('builderAccount') || '{}');
    if (acct.firstName && acct.lastName) userName = acct.firstName + ' ' + acct.lastName;
    else if (acct.firstName) userName = acct.firstName;
    if (acct.email) userEmail = acct.email;
  } catch(e) {}
  document.getElementById('infoName').textContent = userName;
  document.getElementById('infoEmail').textContent = userEmail;

  function getAvailableDays() {
    const days = [];
    const today = new Date();
    today.setHours(0,0,0,0);
    let d = new Date(today);
    d.setDate(d.getDate() + 1 + startOffset);
    let count = 0;
    while (days.length < 5) {
      const dow = d.getDay();
      if (dow !== 0 && dow !== 6) {
        days.push(new Date(d));
      }
      d.setDate(d.getDate() + 1);
      count++;
      if (count > 30) break;
    }
    return days;
  }

  function renderDays() {
    const scroll = document.getElementById('dayScroll');
    const days = getAvailableDays();
    scroll.innerHTML = '';

    days.forEach(function(d) {
      const cell = document.createElement('div');
      cell.className = 'day-cell';
      const key = d.toDateString();
      if (selectedDate && selectedDate.toDateString() === key) cell.classList.add('selected');

      cell.innerHTML =
        '<div class="day-name">' + DAYS_SHORT[d.getDay()] + '</div>' +
        '<div class="day-num">' + d.getDate() + '</div>' +
        '<div class="day-month">' + MONTHS[d.getMonth()].toUpperCase() + '</div>';

      cell.addEventListener('click', function() {
        selectedDate = d;
        selectedTime = null;
        renderDays();
        renderTimes();
        updateSubmit();
      });
      scroll.appendChild(cell);
    });

    document.getElementById('prevWeek').disabled = startOffset <= 0;
  }

  function renderTimes() {
    renderSlotGrid('morningSlots', MORNING);
    renderSlotGrid('afternoonSlots', AFTERNOON);
  }

  function renderSlotGrid(containerId, slots) {
    const c = document.getElementById(containerId);
    c.innerHTML = '';
    slots.forEach(function(t) {
      const btn = document.createElement('div');
      btn.className = 'time-slot';
      if (selectedTime === t) btn.classList.add('selected');
      btn.textContent = t;
      btn.addEventListener('click', function() {
        selectedTime = t;
        renderTimes();
        updateSubmit();
      });
      c.appendChild(btn);
    });
  }

  function updateSubmit() {
    document.getElementById('submitBtn').disabled = !(selectedDate && selectedTime);
  }

  window.shiftDays = function(n) {
    startOffset = Math.max(0, startOffset + n);
    renderDays();
  };

  window.submitBooking = function() {
    if (!selectedDate || !selectedTime) return;

    // Save booking
    try {
      localStorage.setItem('builderBooking', JSON.stringify({
        date: selectedDate.toISOString(),
        time: selectedTime,
        name: userName,
        email: userEmail,
        bookedAt: new Date().toISOString()
      }));
    } catch(e) {}

    // Show success
    var dateStr = DAYS[selectedDate.getDay()] + ', ' + MONTHS_FULL[selectedDate.getMonth()] + ' ' + selectedDate.getDate() + ', ' + selectedDate.getFullYear();
    document.getElementById('successDate').textContent = dateStr;
    document.getElementById('successTime').textContent = selectedTime;

    document.getElementById('bookingForm').classList.add('hidden');
    document.getElementById('successState').classList.add('visible');
  };

  // Init
  renderDays();
  renderTimes();
})();
</script>

</body>
</html>
